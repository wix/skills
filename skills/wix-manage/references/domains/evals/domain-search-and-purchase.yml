name: domains/domain-search-and-purchase
description: Verifies the agent reads the domain-search-and-purchase docs when asked about searching for and purchasing a domain via the Wix API.
triggerPrompt: How do I programmatically search for an available domain on Wix and then purchase it? Please reference the relevant API methods.
tags: [domains]
assertions:
  - tool: ReadFullDocsArticle
    params:
      url: https://dev.wix.com/docs/api-reference/account-level/domains/skills/domain-search-and-purchase
  - type: llm_judge
    prompt: |
      The user asked how to programmatically search for and purchase a domain on Wix.
      Pass if the agent's response describes Wix API methods for domain search and/or domain purchase
      (e.g. mentions specific endpoints or method names from the Wix Domains Management API).
      Fail if the response is generic, hallucinates non-existent endpoints, or describes a different feature.
    minScore: 7
