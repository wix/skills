name: domains/domain-available-full-purchase
description: Buy an available domain — happy path covering availability check, pricing, privacy selection, contact info, cart creation, and checkout link.
triggerPrompt: Buy me mybakery.com
tags: [domains]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/account-level/domains/skills/domain-search-and-purchase
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      Score 9-10: Agent checked availability via the v2 check-domain-availability endpoint, confirmed mybakery.com is available, fetched pricing from the offering API, asked the user for registration period and privacy preference, previewed or collected contact info, saved contact via the intent upsert API, cancelled any existing cart, created a fresh cart, added domain + addon line items, and provided a checkout link to https://manage.wix.com/cart/checkout.
      Score 7-8: Agent completed the full flow but skipped one minor step (e.g. did not cancel old cart, or skipped the privacy addon line item).
      Score 4-6: Agent checked availability and showed pricing but did not complete the cart/checkout steps.
      Score 1-3: Agent did not call the availability API, or failed to provide a checkout link.
      Do NOT penalize for using ManageWixSite as the API caller since no site context was provided.
