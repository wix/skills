name: domains/domain-taken-suggest-alternatives
description: Requested domain is taken — agent must suggest alternatives using the v2 suggest-domains endpoint, not just report unavailability.
triggerPrompt: I want to buy coolstartup.com
tags: [domains]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/domains/skills/domain-search-and-purchase
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      Score 9-10: Agent called check-domain-availability for coolstartup.com, received an unavailable response, immediately called the v2 suggest-domains endpoint (NOT GetSuggestedDomains tool) with a relevant query, and presented a list of available alternatives to the user.
      Score 7-8: Agent correctly identified the domain as taken and suggested alternatives, even if it used a slightly different query string.
      Score 4-6: Agent reported the domain is taken but did not suggest alternatives, or used GetSuggestedDomains instead of the v2 endpoint.
      Score 1-3: Agent did not check availability, or stopped after reporting the domain is unavailable without offering alternatives.
      Fail immediately if the agent used the GetSuggestedDomains tool instead of the https://www.wixapis.com/domain-search/v2/suggest-domains endpoint.
