name: domains/domain-no-premium-voucher-eligible
description: User has a site without a premium plan and the TLD is voucher-eligible — agent must call ListTlds, detect coupons_applicable, and present the two-option upgrade offer.
triggerPrompt: "I want mybakery.com for my website. My site ID is abc-123 and it does not have a premium plan."
tags: [domains]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/account-level/domains/skills/domain-search-and-purchase
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      Score 9-10: Agent checked availability, detected the site has no premium plan, called ListTlds for the .com TLD, found coupons_applicable: true, and presented the user with a clear two-option choice: (1) upgrade to premium and get the domain free, (2) purchase the domain only at full price. The upgrade option linked to https://manage.wix.com/premium-domains/split-page?domainName=mybakery.com.
      Score 7-8: Agent detected the non-premium site and offered the upgrade path, even if it did not explicitly call ListTlds or skipped the getIsOnSale check.
      Score 4-6: Agent mentioned the free domain offer but did not present it as a structured two-option choice, or proceeded directly to standalone purchase without offering the upgrade.
      Score 1-3: Agent ignored the non-premium status and proceeded with a regular purchase without mentioning the free domain offer.
      Fail immediately if the agent presented the free domain offer without checking the site's premium status, or skipped the ListTlds voucher eligibility check entirely.
