name: ecommerce/pricing-promotions/run-a-sale-drive-cross-sells
description: Verifies a "drive cross-sells / pair products" trigger classifies as BUNDLE_AND_SAVE, loads goal-drive-cross-sells, and follows the chain into flow-bundle-and-save with the tracking lifecycle.
triggerPrompt: For my site Gracia (331d0c05-2ab0-4edb-91a6-4078c7e500b9) I want to drive cross-sells and get customers buying more items per order — propose bundle and multi-item discounts I can approve or reject.
tags: [ecommerce]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/e-commerce/skills/goal-drive-cross-sells
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/e-commerce/skills/flow-bundle-and-save
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      Pass if the response (a) lands on the Pricing run-a-sale orchestrator and classifies as BUNDLE_AND_SAVE (cues: "cross-sells", "more items per order"), (b) follows the chain into goal-drive-cross-sells → flow-bundle-and-save and proposes recommendations using minimum-item-quantity / multi-item conditions (NOT pure percent-off discounts), and (c) loads or references api-recommendation-tracking and persists the recommendations as PROPOSED via BatchCreate before presenting.
      Fail if it classifies as UPSELL_BOOST / SEASONAL / STOCK_MOVER, proposes only single-item percent-off discounts with no bundle/min-quantity structure, or skips tracking.
      Topic-completeness beyond the bundle recommendations is NOT required to pass — judge the classification + chain + bundle structure + tracking lifecycle.
