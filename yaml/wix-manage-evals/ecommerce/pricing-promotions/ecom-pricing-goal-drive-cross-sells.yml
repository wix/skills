name: ecommerce/pricing-promotions/run-a-sale-drive-cross-sells
description: Drive cross-sells and get customers buying more items per order — propose bundle and multi-item discounts I can approve or reject.
triggerPrompt: For my site Gracia (331d0c05-2ab0-4edb-91a6-4078c7e500b9) I want to drive cross-sells and get customers buying more items per order — propose bundle and multi-item discounts I can approve or reject.
tags: [ecommerce]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/e-commerce/skills/goal-drive-cross-sells
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      Pass if the response (a) classifies the request as BUNDLE_AND_SAVE (cues: "cross-sells", "more items per order"), (b) proposes recommendations using minimum-item-quantity / multi-item conditions (NOT pure percent-off discounts), and (c) loads or references api-recommendation-tracking and persists the recommendations as PROPOSED via BatchCreate before presenting.
      Fail if it classifies as UPSELL_BOOST / SEASONAL / STOCK_MOVER, proposes only single-item percent-off discounts with no bundle/min-quantity structure, or skips tracking.
      Topic-completeness beyond the bundle recommendations is NOT required to pass — judge the classification + bundle structure + tracking lifecycle. Loading the flow-bundle-and-save sub-recipe is NOT required when the goal recipe supplies the catalog-profile→minItemQuantity matrix the agent uses to build the proposal — the flow's unique value (create-discount-rule mechanics) is for post-approval rule creation, not for this recommendation-generation phase.
