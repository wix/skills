name: ecommerce/pricing-promotions/discount-health
description: Run a pricing health check across all my active discounts and coupons — tell me what's broken, stacking dangerously, or quietly eroding margin.
triggerPrompt: For my site Gracia (331d0c05-2ab0-4edb-91a6-4078c7e500b9) Run a pricing health check across all my active discounts and coupons — tell me what's broken, stacking dangerously, or quietly eroding margin.
tags: [ecommerce]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/e-commerce/skills/pricing-discount-health
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      Pass if the response loads the pricing-health recipe and queries BOTH Discount Rules and Coupons, then severity-ranks findings — stacking/margin breaches first, then stale sales (no end date), then orphaned/cleanup — and names specific rules with concrete fixes (deactivate, add end date, lower depth).
      Fail if it runs the sweep on only one of {discount-rules, coupons}, reports findings without severity ordering, or invents endpoints outside the Discount Rules / Coupons query APIs.
