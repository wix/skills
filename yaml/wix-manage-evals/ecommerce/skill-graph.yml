name: ecommerce/skill-graph
description: Verifies the eCommerce skill graph reflects the six current eCommerce routing categories.
triggerPrompt: For my site Gracia (331d0c05-2ab0-4edb-91a6-4078c7e500b9) Show me the eCommerce skill graph and explain where abandoned carts and fulfillment fit.
tags: [ecommerce]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/e-commerce/skills/skill-graph
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      Pass if the response identifies the eCommerce routing graph and includes Abandoned Carts and Fulfillment as separate categories alongside Tax, Pricing, Shipping, and Checkout.
      Fail if it describes only the older four-category graph.

