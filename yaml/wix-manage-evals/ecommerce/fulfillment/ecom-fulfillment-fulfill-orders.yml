name: ecommerce/fulfillment/fulfill-orders
description: Verifies single-order fulfillment and tracking requests load the fulfillment recipe.
triggerPrompt: For my site Gracia (331d0c05-2ab0-4edb-91a6-4078c7e500b9) Mark order 10027 as fulfilled and add this UPS tracking number.
tags: [ecommerce]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/e-commerce/skills/fulfillment-fulfill-orders-tracking
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      Pass if the response uses the Order Fulfillments API (create-fulfillment or PATCH existing tracking) and surfaces at least one recipe guardrail — checking existing fulfillments before create, avoiding duplicate tracking, or noting that an update needs a fulfillmentId. Recovery from a legacy "shipping fulfill-orders" URL is OK as long as the agent corrects to the new Order Fulfillments endpoint before mutating.
      Fail if the response invents a non-Order-Fulfillments endpoint, treats this as a shipping-rate-setup task, or omits ALL duplicate / existing-fulfillment guardrails.
      Topic-completeness beyond the two asks (mark fulfilled + add tracking) is NOT required to pass — judge the API choice and guardrail surfacing, not the breadth.
