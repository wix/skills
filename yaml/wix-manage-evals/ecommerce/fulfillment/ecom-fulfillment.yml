name: ecommerce/fulfillment
description: Verifies post-purchase fulfillment requests route to the Fulfillment category.
triggerPrompt: For my site Gracia (331d0c05-2ab0-4edb-91a6-4078c7e500b9) Find unshipped orders, update tracking, and tell me where shipping labels are handled.
tags: [ecommerce]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/e-commerce/skills/ecom-fulfillment
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      Pass if the response treats post-purchase order execution as Fulfillment, distinguishes it from shipping setup, and routes unshipped-order lookup, fulfill/update tracking, invoices, and Dashboard-only labels appropriately.
      Fail if it routes fulfillment operations back to shipping rates or shipping setup.
