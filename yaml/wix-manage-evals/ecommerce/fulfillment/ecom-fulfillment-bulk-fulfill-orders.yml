name: ecommerce/fulfillment/bulk-fulfill-orders
description: Bulk fulfill all paid unshipped orders from today and retry only failures.
triggerPrompt: For my site Gracia (331d0c05-2ab0-4edb-91a6-4078c7e500b9) Bulk fulfill all paid unshipped orders from today and retry only failures.
tags: [ecommerce]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/e-commerce/skills/fulfillment-bulk-fulfill-orders
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      Pass if the response selects eligible paid unfulfilled orders, uses the bulk create fulfillments API, batches safely, records per-order results, and retries only failed orders.
      Fail if it suggests rerunning the entire batch blindly or omits partial-failure handling.
