name: ecommerce/shipping/category-routing
description: Set up free shipping for my store.
triggerPrompt: For my site Gracia (331d0c05-2ab0-4edb-91a6-4078c7e500b9) set up free shipping for my store.
tags: [ecommerce]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/e-commerce/skills/shipping
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      Pass if the response routes the free shipping setup request to a Shipping resource (dispatcher or sub-skill) and does NOT route it to Fulfillment, Checkout & Cart, or any other category.
      Fail if the response treats free shipping setup as a Fulfillment action, routes it to order management, or claims no shipping-setup skill exists.
      Topic-completeness beyond the routing decision (exact threshold, AOV calculation, etc.) is NOT required to pass — judge the category routing, not the breadth.
