name: ecommerce/shipping/fix-coverage
description: Verifies a "regions with no shipping options" complaint dispatches to fix-coverage and detects zero-option regions before adding standard shipping.
triggerPrompt: For my site Gracia (331d0c05-2ab0-4edb-91a6-4078c7e500b9) I just noticed some customers can't check out because their delivery region has no shipping options. Find the gaps and fix them.
tags: [ecommerce]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/e-commerce/skills/shipping-fix-coverage-gaps
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      Pass if the response loads the fix-coverage recipe, cross-references Delivery Profiles with Shipping Options to detect active regions with zero options, presents a health-score / international-filter summary before mutating, and then adds standard shipping to the gap regions using the Shipping Options API.
      Fail if it blindly creates rates without first detecting the gap, conflates the issue with rate-setup, or skips the cross-reference between profiles and options.
