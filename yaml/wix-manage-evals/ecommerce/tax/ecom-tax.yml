name: ecommerce/tax/ecom-tax
description: I'm not sure how to handle tax — can you help me figure out what to set up?
triggerPrompt: For my site Gracia (331d0c05-2ab0-4edb-91a6-4078c7e500b9) I'm not sure how to handle tax for my store. I sell in a few different countries. Can you help me figure out what I need to set up?
tags: [ecommerce]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/e-commerce/skills/tax
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      Pass if the response treats this as a **Tax** question, asks (or grounds in MerchantContext) which country/region the merchant sells in, and steers them toward the appropriate setup recipe — EU VAT for EU countries (`region:EU`), Wix Manual for everything else by default, or the troubleshoot recipe if the merchant later reports a wrong calculation on a specific order.
      Fail if it treats this as a Pricing / Catalog / Checkout question, invents tax steps detached from the store's country/region context, or skips the country/region grounding entirely.
      Topic-completeness beyond country-grounded setup routing is NOT required to pass — judge the boundary (Tax vs other categories) and the country/region grounding, not the breadth.
