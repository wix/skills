name: ecommerce/tax/ecom-tax
description: Help me set up tax for my store and explain when to use Avalara vs Wix Manual.
triggerPrompt: For my site Gracia (331d0c05-2ab0-4edb-91a6-4078c7e500b9) Help me set up tax for my store and explain when to use Avalara vs Wix Manual.
tags: [ecommerce]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/e-commerce/skills/tax
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      Pass if the response explains the Wix Manual vs Avalara choice (and surfaces EU VAT when relevant) and grounds its recommendation in the store's current tax state (existing calculator/regions/mappings, or country/region context). It must treat this as a Tax question.
      Fail if it skips the calculator comparison, treats this as a Pricing/Catalog/Checkout question, or invents tax steps detached from the store's actual configuration.
      Topic-completeness beyond Avalara vs Wix Manual is NOT required to pass — judge the calculator choice and grounding, not the breadth.
