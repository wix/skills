name: ecommerce/tax/ecom-tax
description: Verifies the Tax category entry routes tax-setup questions through the tax dispatcher (Avalara vs EU VAT vs Wix Manual) and acknowledges the calculator choice before dispatching.
triggerPrompt: For my site Gracia (331d0c05-2ab0-4edb-91a6-4078c7e500b9) Help me set up tax for my store and explain when to use Avalara vs Wix Manual.
tags: [ecommerce]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/e-commerce/skills/ecom-tax
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      Pass if the response loads the Tax category dispatcher and references the calculator choice (Wix Manual, Avalara, EU VAT) before recommending a configure recipe — i.e. it dispatches via context tags rather than inventing tax steps.
      Fail if it skips the calculator-choice step, dispatches straight to a generic configure recipe without acknowledging Wix Manual vs Avalara, or treats this as a Pricing/Catalog question.
