name: ecommerce/checkout/category-routing
description: Verifies Checkout & Cart now routes abandoned recovery to Abandoned Carts while keeping live checkout drop-off.
triggerPrompt: For my site Gracia (331d0c05-2ab0-4edb-91a6-4078c7e500b9) Customers are dropping off during checkout, but I also want to recover people who already left.
tags: [ecommerce]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/e-commerce/skills/checkout-cart
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      Pass if the response treats the two asks as separate categories — directs the live checkout drop-off work to a Checkout & Cart resource and directs the post-abandonment recovery to an Abandoned Carts resource — and contains no claim that abandoned-cart recovery is owned by Checkout & Cart.
      Fail if the response treats recovery as part of Checkout & Cart, claims a single skill covers both, or routes "recover people who already left" back to a checkout-config / live-drop-off recipe.
      Topic-completeness beyond the two asks (guest checkout, minimum order, custom fields, recovery-link generation, etc.) is NOT required to pass — judge the boundary, not the breadth.
