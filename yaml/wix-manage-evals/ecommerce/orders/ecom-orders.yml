name: ecommerce/orders/ecom-orders
description: Verifies the Orders category routes order lookup, search, pending diagnosis, and handoffs without confusing fulfillment or payments ownership.
triggerPrompt: For my site Gracia (331d0c05-2ab0-4edb-91a6-4078c7e500b9) Show me today's orders, then explain what to do if one order is stuck pending or needs a refund.
tags: [ecommerce]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/e-commerce/skills/ecom-orders
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      Pass if the response uses Orders Search/Get for order lookup, diagnoses pending orders by status/payment/fulfillment, and routes fulfillment to Fulfillment and refunds/payments to Get Paid.
      Fail if it treats generic order lookup as fulfillment-only or immediately refunds/cancels without routing/confirmation.
