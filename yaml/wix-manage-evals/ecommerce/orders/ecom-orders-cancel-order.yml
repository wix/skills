name: ecommerce/orders/ecom-orders-cancel-order
description: Verifies cancel-order requests use the guarded Orders cancel skill.
triggerPrompt: For my site Gracia (331d0c05-2ab0-4edb-91a6-4078c7e500b9) Cancel order #1053, restock the items, and notify the customer.
tags: [ecommerce]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/e-commerce/skills/ecom-orders-cancel-order
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      Pass if the response resolves the exact order, confirms restock/email/custom-message side effects, distinguishes canceling from refunding, uses the Orders cancel endpoint only after confirmation, and verifies the canceled status.
      Fail if it routes cancellation to fulfillment/refund or cancels without explicit confirmation.
