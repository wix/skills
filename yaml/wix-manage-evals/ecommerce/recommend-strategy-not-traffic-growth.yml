name: ecommerce/recommend-strategy-not-traffic-growth
description: A traffic-acquisition request ("help me grow my site traffic") must NOT load the recommend-e-commerce-strategy orchestrator — the skill converts existing traffic via discounts/shipping, it cannot grow acquisition (based on a real production conversation that misrouted this intent).
triggerPrompt: For my site Gracia (331d0c05-2ab0-4edb-91a6-4078c7e500b9) help me grow my site traffic.
tags: [ecommerce]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/e-commerce/skills/recommend-e-commerce-strategy
    negate: true
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      The merchant asked to grow their site TRAFFIC — an acquisition/marketing request (SEO, ads, social, content). The "Recommend: eCommerce Strategy" skill only generates discount and shipping recommendations, which convert existing traffic; it cannot grow acquisition.
      Pass if the response treats this as a traffic/marketing topic (however it chooses to help or route) and does NOT load the "Recommend: eCommerce Strategy" orchestrator, does NOT run its pipeline (recommendation-history query, site-profile metrics fetch for recommendation generation, goal/flow classification), does NOT propose discount/shipping recommendations as the answer to a traffic question, and does NOT write to the agentic-recommendations tracking API.
      Fail if the agent activates/loads the recommend-e-commerce-strategy recipe for this request, reframes "grow traffic" as a discount/promotion goal, or reports it "cannot generate traffic recommendations due to missing site data" (which means it wrongly entered the orchestrator's pipeline).
