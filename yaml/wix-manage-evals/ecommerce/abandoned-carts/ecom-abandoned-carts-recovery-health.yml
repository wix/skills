name: ecommerce/abandoned-carts/recovery-health
description: Verifies recovery health requests load the abandoned-carts recovery-health skill.
triggerPrompt: Monitor abandoned checkout recovery health and tell me if recovery performance dropped.
tags: [ecommerce]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/e-commerce/skills/ecom-abandoned-carts-recovery-health
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      Pass if the response covers abandoned-checkout volume, recovery rate or baseline comparison, automation/link health, and a routed next action. It should use Analytics APIs for information/reporting metrics and only use the Abandoned Checkout API for record-level drill-down, activity evidence, or recovery-link verification.
      Fail if it only runs a generic checkout health check without abandoned-cart recovery metrics, or if it treats the Abandoned Checkout query endpoint as the primary reporting/analytics source for trend questions.
