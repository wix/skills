name: ecommerce/ecom-abandoned-carts
description: Show me abandoned checkouts so I can decide whether to recover them with emails or resume-checkout links.
triggerPrompt: For my site Gracia (331d0c05-2ab0-4edb-91a6-4078c7e500b9) I want to see abandoned checkouts and decide whether to recover them with emails or links.
tags: [ecommerce]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/e-commerce/skills/abandoned-carts
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      Pass if the response covers post-shopper-leaves recovery (abandoned-checkout lookup + at least one of: recovery email, recovery link, troubleshooting, recovery health) AND keeps it distinct from live checkout drop-off prevention.
      Fail if the response treats abandoned-cart recovery as owned by Checkout & Cart, gives only generic checkout advice, or conflates live drop-off with post-shopper-leaves recovery.
      Loading a specific Abandoned Carts sub-recipe (recover-email, recovery-link, troubleshoot, health) is fine and counts as routing to the category — topic-completeness beyond one or two recovery paths is NOT required.
