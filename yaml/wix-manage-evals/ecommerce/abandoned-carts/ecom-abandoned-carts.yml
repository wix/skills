name: ecommerce/ecom-abandoned-carts
description: Verifies the agent routes abandoned-checkout recovery and lookup requests to the Abandoned Carts category.
triggerPrompt: I want to see abandoned checkouts and decide whether to recover them with emails or links.
tags: [ecommerce]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/e-commerce/skills/ecom-abandoned-carts
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      Pass if the response routes abandoned-checkout lookup and recovery after the shopper leaves to the Abandoned Carts category, distinguishes it from live checkout drop-off prevention, and mentions at least one route such as analytics/reporting for information queries, recovery email, recovery link, troubleshooting, or recovery health. It should prefer Analytics APIs for counts, trends, and reports, while using the Abandoned Checkout API for record-level lookup or recovery actions.
      Fail if the response treats abandoned-cart recovery as owned by Checkout & Cart or gives only generic checkout advice.
