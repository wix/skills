name: ecommerce/abandoned-carts/category-routing
description: I have many abandoned carts, how do I recover them?
triggerPrompt: For my site Gracia (331d0c05-2ab0-4edb-91a6-4078c7e500b9) I have many abandoned carts, how do I recover them?
tags: [ecommerce]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/e-commerce/skills/abandoned-carts
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      Pass if the response routes the abandoned cart recovery request to an Abandoned Carts resource (dispatcher or sub-skill) and does NOT route it to Checkout & Cart or any live-checkout resource as the primary answer.
      Fail if the response treats abandoned cart recovery as a Checkout & Cart action, claims recovery and live drop-off are the same category, or routes post-abandonment recovery back to checkout-config / live-drop-off recipes as the main answer.
      Topic-completeness beyond the routing decision (automation activation steps, recovery rate benchmarks, etc.) is NOT required to pass — judge the category routing, not the breadth.
