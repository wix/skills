name: ecommerce/ecom-load-context
description: Resolve my eCommerce site context (siteId, country, currency) before I ask anything else about my store.
triggerPrompt: For my site Gracia (331d0c05-2ab0-4edb-91a6-4078c7e500b9) Resolve my eCommerce site context (siteId, country, currency) before I ask anything else about my store.
tags: [ecommerce]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/e-commerce/skills/e-commerce-load-context
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      Pass if the response loads the eCommerce Load Context recipe, resolves siteId for Gracia (either via ListWixSites or by recognizing the site from the prompt), and reports or describes loading at least siteId plus country and currency before dispatching to any category.
      Fail if the response skips context loading and dispatches directly to a category recipe, or invents fields that are not in the load-context recipe.
