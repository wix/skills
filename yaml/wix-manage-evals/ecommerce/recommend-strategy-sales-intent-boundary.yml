name: ecommerce/recommend-strategy-sales-intent-boundary
description: Positive boundary control — a genuine sales-growth request that mentions past performance must STILL load the recommend-e-commerce-strategy orchestrator (the analytics exclusion must not over-block real strategy intents).
triggerPrompt: For my site Gracia (331d0c05-2ab0-4edb-91a6-4078c7e500b9) my sales dropped last month — what should I do to get them back up? Give me concrete actions I can approve.
tags: [ecommerce]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/e-commerce/skills/recommend-e-commerce-strategy
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      The merchant mentioned past performance ("sales dropped last month") but the actual ask is sales-growth advice with approvable actions — this IS a strategy request, not an analytics report.
      Pass if the agent loads the "Recommend: eCommerce Strategy" orchestrator and produces concrete, data-grounded recommendations the merchant can approve (each with an action and reasoning citing live site data such as AOV, orders, country, or currency).
      Fail if the agent refuses because the prompt mentions past sales data, answers with only a numbers report and no recommendations, produces generic advice without any API-grounded data, or asks clarifying questions instead of executing.
      Topic-completeness across all discount goals and shipping is NOT required to pass — judge that the orchestrator was correctly triggered and produced grounded, approvable recommendations.
