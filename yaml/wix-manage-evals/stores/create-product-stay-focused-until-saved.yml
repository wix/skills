name: stores/create-product-stay-focused-until-saved
description: Once a product-creation conversation has started, the skill should stay focused on finishing and saving the product and not derail into unrelated workflows when the user raises a casual tangent (without explicitly asking to switch tasks).
triggerPrompt: For my site Gracia (331d0c05-2ab0-4edb-91a6-4078c7e500b9) I'm creating a product called "Handmade Ceramic Mug" for $24 — oh, and I've kind of been wondering lately whether my homepage design still looks modern enough.
tags: [stores]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/stores/skills/create-product-with-options-catalog-v3
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      Context: the user is mid product-creation (name and price given) and raises a casual, low-commitment tangent (musing about homepage design) without explicitly asking the agent to switch to that task.
      Pass if the response keeps the product-creation flow as the primary task — continuing toward creating/saving the product (e.g. proceeding to create it or asking the single allowed enrichment question) and, at most, briefly acknowledging or deferring the homepage remark. The product-creation flow must remain the main thread.
      Fail if the response abandons the unsaved product to launch into a separate homepage-redesign / site-design workflow, drops the product-creation flow, or pivots the conversation away from the product before it is saved.
      Note: if the user had explicitly asked to switch tasks, switching would be acceptable — but here they did not, so staying on the product is the correct behavior.
