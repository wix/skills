name: stores/add-store-pages-to-site
description: Verifies the agent reads the Add Store Pages to Site recipe and correctly handles the endpoint's long-running behavior — treating a 504 as "likely still running, verify before retrying" instead of a hard failure.
triggerPrompt: My Wix Stores checkout page is missing so I called POST https://www.wix.com/_api/add-pages-to-site/install to restore the store pages, but after about 30 seconds it returned 504 Gateway Timeout. Did it fail? Should I call it again right away?
tags: [stores]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/stores/skills/add-store-pages-to-site
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      The user ran the add-pages-to-site install endpoint to restore missing Wix Stores pages and got a 504 Gateway Timeout after ~30 seconds. They ask whether it failed and whether to retry immediately.

      Score 9-10: Agent gives a clear direct answer that the endpoint is long-running and a 504 does not mean the installation failed (it usually keeps running server-side), tells the user NOT to retry immediately, explains why retrying is not harmless (another full scan/add/republish pass can overlap the first), and instructs the user to wait 1-2 minutes and verify the store pages exist before considering one more call.
      Score 7-8: Agent conveys that the 504 likely means the operation is still in progress and recommends verifying the pages before retrying, even if details differ.
      Score 4-6: Agent treats the 504 as ambiguous but recommends an immediate retry, or omits verification guidance.
      Score 1-3: Agent treats the 504 as a hard failure, tells the user to retry immediately or repeatedly, or invents a different endpoint.
