name: example/example-settings-method-description
description: >-
  Revision-eval scenario. Asks the agent for the Create method description of the
  wix.portfolio.portfolio_app.v1.portfolio_settings entity and (via llm_judge) passes only if the
  answer contains the override sentinel — proving the staged preview revision is being served
  instead of the published docs. Paired with .github/fixtures/example-settings.json (shared tag
  `beta`).
triggerPrompt: provide me the Create Portfolio Settings method description
tags: [beta]
assertions:
  - type: llm_judge
    minScore: 7
    maxTokens: 1024
    prompt: |
      The user asked for the exact description of the "Create Portfolio Settings" method on the
      wix.portfolio.portfolio_app.v1.portfolio_settings entity.
      Intent: confirm the staged preview revision is in effect by checking the override sentinel.

      Pass if the response contains the sentinel description, verbatim or near-verbatim:
      "Fake description — this method description is intentionally a placeholder that the eval should override".

      Fail if the response:
      - does not contain that sentinel description, OR
      - reports a different description for the Create method, OR
      - claims the entity or method does not exist.
