name: bookings/diagnose-availability-issues
description: >-
  Verifies the agent reads the diagnose-availability-issues recipe when a site
  owner asks why an appointment service has no bookable times, and replies with a
  plain-language cause and fix (not raw API/reason-code details).
triggerPrompt: >-
  Customers keep telling me they can't book one of my Wix Bookings appointment
  services — there are no available times showing. Can you figure out why and
  tell me how to fix it?
tags: [bookings]
maxTokens: 30000
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/bookings/skills/diagnose-bookings-availability-issues
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      The user is a Wix site owner asking, in a conversation, why one of their appointment
      services shows no available times and how to fix it.
      Intent: diagnose the likely cause of empty availability and give an actionable fix,
      in plain language suitable for a business owner.

      Pass if the response:
      - identifies one or more concrete, service-setup causes of empty availability — such as
        no staff/resources assigned, staff have no working hours, staff don't work at the
        service's location(s), no availability in the date range, or duration/buffer too large
        for the schedule, AND
      - gives an actionable next step to fix the identified cause (e.g. assign staff, set or
        extend working hours, align staff/service locations, adjust the dates or duration), AND
      - is written in plain language for an owner.

      Fail if the response:
      - is generic troubleshooting with no specific availability cause or fix, OR
      - dumps implementation internals at the user — raw reason codes, suggestedAction enum
        values, JSON, field paths, or instructions for the user to call an API/endpoint
        themselves, OR
      - invents causes or fixes unrelated to Wix Bookings availability.
