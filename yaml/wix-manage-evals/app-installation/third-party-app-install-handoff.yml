name: app-installation/third-party-app-install-handoff
description: >-
  Verifies the install-wix-apps skill distinguishes third-party app installation
  from in-app configuration and handles a non-loading app dashboard with bounded
  troubleshooting and support handoff.
triggerPrompt: >-
  I installed a third-party marketplace app on my Wix site through the Apps
  Installer API. The app dashboard never loads, but I still need to finish its
  in-app setup for seller payouts. What should I tell the user and what should I
  avoid claiming?
tags: [app-installation]
assertions:
  - tool: wix_mcp_remote_ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-management/app-installation/skills/install-wix-apps
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      The user asks how to respond after installing a third-party marketplace app when the app dashboard never loads.
      Intent: use the install-wix-apps guidance to separate installation from third-party in-app configuration.

      Pass if the response:
      - says the Apps Installer API only installs/enables the app and does not prove app-specific payout/setup rules were configured, AND
      - warns not to claim seller payouts, commission rules, or other app-specific settings are configured unless verified through app-specific APIs or the visible app UI, AND
      - gives bounded loading troubleshooting for the Wix dashboard/app panel such as incognito/private window, popups, ad blockers/privacy extensions, hard refresh, and asking for blank/spinner/error/screenshot details, AND
      - explains that if only the third-party app screen still fails, the app provider/App Market support or Wix Customer Care should be contacted with app/site/browser/error details, AND
      - offers to continue field-by-field once the app UI loads.

      Fail if the response:
      - says the payout setup or third-party app configuration is complete just because the app install succeeded, OR
      - invents specific third-party app settings or internal fields, OR
      - keeps trying to configure the third-party app with Wix APIs that are not documented for that app, OR
      - gives only generic browser troubleshooting without clarifying the third-party ownership/support handoff.
