name: rich-content/ricos-table-and-decorations
description: Sharp-edge check on the Author Ricos Rich Content recipe — the exact field names for a filled table header cell and for inline text decorations, which are easy to get wrong without the recipe.
triggerPrompt: Give me the Ricos rich-content JSON (nodes tree) for a two-column comparison table titled Plans, with a filled/colored header row (Feature | Price) and two body rows, followed by a paragraph that says "See the full pricing page" where "full pricing page" is a bold hyperlink to https://example.com/pricing. Output the richContent JSON.
tags: [rich-content]
maxTokens: 150000
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/assets/rich-content/skills/author-ricos-rich-content
  - type: llm_judge
    minScore: 8
    maxTokens: 2048
    prompt: |
      The user asked for Ricos rich-content JSON containing a comparison table with a filled header row and a paragraph with a bold hyperlink. Inspect the produced JSON against these exact-shape requirements.

      Table requirements:
      - nesting is TABLE → TABLE_ROW → TABLE_CELL → PARAGRAPH → TEXT (no TEXT directly in a cell),
      - the header row cells set the fill via `tableCellData.cellStyle.backgroundColor` with a hex color (NOT a top-level `backgroundColor`, NOT a `fill` or `color` field),
      - `tableData.dimensions` is present (e.g. `colsWidthRatio`).

      Decoration requirements:
      - the linked words are a TEXT run whose `decorations` array contains a LINK decoration shaped `{ "type": "LINK", "linkData": { "link": { "url": "https://example.com/pricing", "target": "BLANK" } } }`,
      - the same run (or an overlapping run) carries a BOLD decoration shaped `{ "type": "BOLD", "fontWeightValue": 700 }`,
      - the non-linked part of the sentence is a separate TEXT run without the link (mixed formatting is split into multiple TEXT nodes).

      Score 9-10: table uses `tableCellData.cellStyle.backgroundColor` for the header fill with correct nesting, AND the link uses `linkData.link.url` with a BOLD run, AND mixed formatting is split across TEXT runs.
      Score 6-8: correct overall but one field name or nesting detail is off (e.g. bold and link not both applied, or dimensions missing).
      Score 3-5: the fill uses a wrong field name/location, OR TEXT is placed directly in a TABLE_CELL, OR the link data is malformed.
      Score 0-2: no table, no decorations, or prose-only output.
