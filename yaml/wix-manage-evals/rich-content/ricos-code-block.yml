name: rich-content/ricos-code-block
description: Verifies the agent builds a CODE_BLOCK node with TEXT children (not a bare TEXT or a decorated paragraph) using the Author Ricos Rich Content recipe.
triggerPrompt: Give me the Ricos rich-content JSON (the nodes tree) with a short intro paragraph followed by a code block containing a one-line shell command. Output only the richContent JSON.
tags: [rich-content]
maxTokens: 150000
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/assets/rich-content/skills/author-ricos-rich-content
  - type: llm_judge
    minScore: 8
    maxTokens: 2048
    prompt: |
      Inspect the produced Ricos JSON for a code block.

      Score 9-10: contains a CODE_BLOCK node whose children are TEXT node(s) holding the command, with `codeBlockData` present; there is also a PARAGRAPH intro; every `type` is a bare string; the command text is not stuffed with literal `\n` line breaks inside a single TEXT when multiple lines are needed.
      Score 6-8: a CODE_BLOCK is present and holds the command but a minor field (`codeBlockData`) is missing.
      Score 3-5: the code is placed in a PARAGRAPH or a decorated TEXT instead of a CODE_BLOCK, OR the CODE_BLOCK holds a non-TEXT child directly.
      Score 0-2: no code block, or prose/plain-text output.
