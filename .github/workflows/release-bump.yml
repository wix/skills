name: Release - Bump Version and Open PR

on:
  workflow_dispatch:
    inputs:
      version_strategy:
        type: choice
        description: Version strategy
        options:
          - patch
          - minor
          - major
          - prerelease
          - premajor
          - preminor
          - prepatch
      dry_run:
        description: 'Dry run (preview only, no branch/commit/PR)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Dry-run preview
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          echo "Would bump @wix/agent-skills from $CURRENT using strategy: ${{ github.event.inputs.version_strategy }}"

      - name: Bump version
        if: ${{ github.event.inputs.dry_run == 'false' }}
        id: bump
        run: |
          NEW_VERSION=$(npm version ${{ github.event.inputs.version_strategy }} --no-git-tag-version)
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "branch=release/${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Create release branch and commit
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          git checkout -b ${{ steps.bump.outputs.branch }}
          git add package.json
          git commit -m "chore: release @wix/agent-skills ${{ steps.bump.outputs.version }}"
          git push -u origin ${{ steps.bump.outputs.branch }}

      - name: Open release PR
        if: ${{ github.event.inputs.dry_run == 'false' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head ${{ steps.bump.outputs.branch }} \
            --title "chore: release @wix/agent-skills ${{ steps.bump.outputs.version }}" \
            --body "Automated release PR for **${{ steps.bump.outputs.version }}**.

          When this PR is merged, \`release-tag.yml\` will push the matching tag, which triggers \`release.yml\` to publish to npm via Trusted Publishing.

          No manual steps required after merge."
