name: EvalForge Gate

# Phase 0 POC of the EvalForge coverage gate.
# Runs additively alongside skill-eval. Non-blocking until validated.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      # Phase 0: only the one folder we're piloting (matches the demo manifest).
      # Widen as more folders adopt .evalforge.yml.
      - 'skills/wix-manage/references/blog/**'

concurrency:
  group: evalforge-gate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft && github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: .action-src
      - uses: ./.action-src/.github/actions/evalforge-gate
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          evalforge-url: ${{ vars.EVALFORGE_URL }}
          evalforge-project-id: ${{ vars.AUTO_SKILLS_PIPELINE_PROJECT_ID }}
          evalforge-agent-id: ${{ vars.AUTO_SKILLS_PIPELINE_AGENT_ID }}
          evalforge-mcp-id: ${{ vars.AUTO_SKILLS_PIPELINE_MCP_ID }}
          evalforge-app-id: ${{ secrets.AUTO_SKILLS_PIPELINE_APP_ID }}
          evalforge-app-secret: ${{ secrets.AUTO_SKILLS_PIPELINE_APP_SECRET }}
          # Phase 0: non-blocking by default. Flip via the EVAL_BLOCK_MERGE repo var when ready.
          blocking: ${{ vars.EVAL_BLOCK_MERGE || 'false' }}
