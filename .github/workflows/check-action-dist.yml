name: Check Action Dist

on:
  pull_request:
    paths:
      - '.github/actions/skill-eval/src/**'
      - '.github/actions/skill-eval/package.json'
      - '.github/actions/skill-eval/tsconfig.json'

jobs:
  check-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: corepack enable
      - run: yarn install --immutable
        working-directory: .github/actions/skill-eval
      - run: yarn build
        working-directory: .github/actions/skill-eval
      - name: Fail if dist is stale
        run: git diff --exit-code .github/actions/skill-eval/dist/
