name: Headless Skill Eval

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
    paths:
      - 'skills/wix-headless/**'

concurrency:
  group: headless-skill-eval-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  headless-skill-eval:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/headless-skill-eval
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          evalforge-url: ${{ vars.HEADLESS_EVALFORGE_URL }}
          evalforge-project-id: ${{ vars.HEADLESS_EVALFORGE_PROJECT_ID }}
          evalforge-agent-id: ${{ vars.HEADLESS_EVALFORGE_AGENT_ID }}
          evalforge-entry-cap-id: ${{ vars.HEADLESS_EVALFORGE_ENTRY_CAP_ID }}
          evalforge-app-id: ${{ secrets.HEADLESS_EVALFORGE_APP_ID }}
          evalforge-app-secret: ${{ secrets.HEADLESS_EVALFORGE_APP_SECRET }}
