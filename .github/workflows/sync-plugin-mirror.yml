name: Sync Plugin Mirror

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 24

      - name: Refresh plugins/wix/ from repo root
        run: node .github/scripts/sync-plugin-mirror.mjs

      - name: Check for changes
        id: sync
        run: |
          if git diff --quiet -- plugins/wix; then
            echo "has_changes=false" | tee -a "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" | tee -a "$GITHUB_OUTPUT"
          fi

      - name: Create or update Pull Request
        if: steps.sync.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B sync/plugin-mirror
          git add plugins/wix/
          git commit -m "chore: sync plugins/wix/ mirror with repo root"
          git push -f origin sync/plugin-mirror
          if gh pr list --head sync/plugin-mirror --state open --json number --jq '.[0].number' | grep -q .; then
            echo "PR already exists, updated branch."
          else
            gh pr create \
              --head sync/plugin-mirror \
              --title "chore: sync plugins/wix/ mirror with repo root" \
              --body "$(cat <<'EOF'
          Automated sync of \`plugins/wix/\` with the canonical content at the repo root (\`.codex-plugin/\`, \`.mcp.json\`, \`assets/\`, \`skills/\`).

          This mirror is what the Codex marketplace reads (\`source.path: "./plugins/wix"\`). The root is the source of truth; this PR keeps the Codex install path in sync.
          EOF
          )"
          fi
