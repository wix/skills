name: Revision Eval

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "yaml/wix-manage-evals/**"

concurrency:
  group: revision-eval-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  revision-eval:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      # BOOTSTRAP: running the action from the PR checkout so the eval can run on the PR that introduces the action (base branch doesn't have it yet). Once this is on main, revert tothe base-branch checkout pattern below so untrusted PR code can't run with secrets:
      #   - uses: actions/checkout@<sha>   # v4
      #     with: { ref: ${{ github.event.pull_request.base.sha }}, path: .action-src }
      #   - uses: ./.action-src/.github/actions/revision-eval
      - uses: ./.github/actions/revision-eval
        with:
          mode: eval
          github-token: ${{ secrets.GITHUB_TOKEN }}
          evalforge-url: ${{ vars.EVALFORGE_URL }}
          evalforge-project-id: ${{ vars.AUTO_SKILLS_PIPELINE_PROJECT_ID }}
          evalforge-agent-id: ${{ vars.AUTO_SKILLS_PIPELINE_AGENT_ID }}
          evalforge-mcp-id: ${{ vars.AUTO_SKILLS_PIPELINE_MCP_ID }}
          evalforge-app-id: ${{ secrets.AUTO_SKILLS_PIPELINE_APP_ID }}
          evalforge-app-secret: ${{ secrets.AUTO_SKILLS_PIPELINE_APP_SECRET }}
          blocking: ${{ vars.EVAL_BLOCK_MERGE }}
