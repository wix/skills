name: Wix App Typecheck

on:
  pull_request:
    branches: [main]
    paths:
      - 'skills/wix-app/**'

concurrency:
  group: wix-app-typecheck-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: .github/wix-app-typecheck
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'

      - name: Cache node_modules
        id: cache-deps
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: .github/wix-app-typecheck/node_modules
          key: ${{ runner.os }}-node-modules-wix-app-typecheck-${{ hashFiles('.github/wix-app-typecheck/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm install --legacy-peer-deps

      - name: Typecheck
        run: node extract.mjs
