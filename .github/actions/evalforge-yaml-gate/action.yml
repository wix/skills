name: 'EvalForge YAML Gate'
description: 'Authors YAML scenarios in PRs and runs EvalForge evaluations against PR-version docs'
inputs:
  mode:
    description: 'Action mode: "create-version" registers the per-PR MCP capability version; "eval" (default) runs the gate; "promote" applies YAML tags on PR merge; "cleanup" deletes MCP versions and restores or removes draft scenarios on PR close'
    required: false
    default: 'eval'
  github-token:
    description: 'GitHub token for PR comments'
    required: true
  evalforge-url:
    description: 'EvalForge API base URL'
    required: true
  evalforge-project-id:
    description: 'EvalForge project ID'
    required: true
  evalforge-agent-id:
    description: 'EvalForge agent ID for eval runs (required for eval mode)'
    required: false
  evalforge-mcp-id:
    description: 'EvalForge MCP capability ID'
    required: true
  evalforge-app-id:
    description: 'EvalForge app ID for authentication'
    required: true
  evalforge-app-secret:
    description: 'EvalForge app secret for authentication'
    required: true
  mcp-skills-repo:
    description: 'Override skillsRepo URL param when creating the per-PR MCP version (defaults to GITHUB_REPOSITORY)'
    required: false
    default: ''
  mcp-version-id:
    description: 'MCP capability version ID created by a prior create-version step; passed to eval mode so it can reference the correct version without re-creating it'
    required: false
    default: ''
  blocking:
    description: 'Fail the check on gate errors or scenario failures (set to true to block merges)'
    required: false
    default: 'false'
outputs:
  mcp-version-id:
    description: 'ID of the MCP capability version created or resolved by create-version mode'
runs:
  using: 'node20'
  main: 'dist/index.js'
