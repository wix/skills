name: 'EvalForge Gate'
description: 'Manifest-driven EvalForge coverage gate for PRs (POC — Phase 0 of the coverage-gate design)'
inputs:
  mode:
    description: 'Action mode: "eval" (default) runs the coverage gate; "cleanup" deletes MCP versions on PR close; "promote" removes pending:<repo>#<pr> tags on merge.'
    required: false
    default: 'eval'
  github-token:
    description: 'GitHub token for PR comments / API calls'
    required: true
  evalforge-url:
    description: 'EvalForge API base URL'
    required: true
  evalforge-project-id:
    description: 'EvalForge project ID'
    required: true
  evalforge-agent-id:
    description: 'EvalForge agent ID for eval runs (required for eval mode)'
    required: false
  evalforge-mcp-id:
    description: 'EvalForge MCP capability ID'
    required: true
  evalforge-app-id:
    description: 'EvalForge app ID for authentication'
    required: true
  evalforge-app-secret:
    description: 'EvalForge app secret for authentication'
    required: true
  mcp-skills-repo:
    description: 'Value passed to the MCP as ?skillsRepo=... (defaults to the current repo via GITHUB_REPOSITORY).'
    required: false
    default: ''
  blocking:
    description: 'Fail the check on EvalForge errors or eval failures (set to false to make eval non-blocking)'
    required: false
    default: 'false'
runs:
  using: 'node20'
  main: 'dist/index.js'
