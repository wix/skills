# headless-eval-map.yaml
#
# Maps files changed in a wix/skills PR (under skills/wix-headless/**) to the
# EvalForge scenario tags that should run for that change.
#
# How it's consumed (resolve_evals.py):
#   - For every changed path, collect the `dryRun` and `e2e` tags of ALL rules
#     whose globs match (union — not first-match).
#   - dryRun "*" means "the whole dry-run suite" (run by the umbrella tag).
#   - Dry-run scenarios ALWAYS run (cheap, ~$1.5 each). e2e scenarios run only
#     when the PR carries the `e2e.label`, and are trimmed to `e2e.budgetUsd`.
#   - A changed wix-headless file that matches no rule falls back to `fallback`.
#
# Tags reference the EvalForge project "Tech Writers - Skill Evals"
# (cd479f00-8e05-473b-9c10-3a2886387dbf): dry-run scenarios carry `hs-dry-run`
# + a family subtag (hs-dr-*); e2e scenarios carry `headless-skills` + hs-<vertical>.

version: 1

# Running by this umbrella tag = the full dry-run suite (used for broad-impact files).
allDryRunTag: hs-dry-run

e2e:
  label: run-e2e            # PR label that opts a PR into e2e builds
  budgetUsd: 60             # hard cap per PR; resolver drops most-expensive verticals over budget
  costUsd:                  # approx per-vertical cost (from run history) for the budget trim
    hs-store: 6
    hs-forms: 7
    hs-portfolio: 12
    hs-blog: 12
    hs-pricing-plans: 13
    hs-restaurants: 13
    hs-restaurant-experiences: 20
    hs-events: 20
    hs-cms: 26
    hs-bookings: 34

rules:
  # ── Core router / dispatch: broad blast radius → whole dry-run suite ──
  - paths: ["skills/wix-headless/SKILL.md", "skills/wix-headless/entry/**"]
    dryRun: ["*"]
    e2e: []                 # entry/router changes: opt into e2e explicitly if needed
  - paths: ["skills/wix-headless/references/CAPABILITIES.md"]
    dryRun: ["*"]           # the vertical index touches routing + every intra branch
    e2e: []

  # ── Agnostic spine ──
  - paths: ["skills/wix-headless/references/DISCOVERY.md"]
    dryRun: [hs-dr-routing, hs-dr-gates]     # capability inference + the imagery gate
    e2e: []
  - paths: ["skills/wix-headless/references/DOC_DISCOVERY.md"]
    dryRun: [hs-dr-routing]
    e2e: []
  - paths: ["skills/wix-headless/references/SETUP.md"]
    dryRun: [hs-dr-appinstall, hs-dr-preconditions]
    e2e: []
  - paths: ["skills/wix-headless/references/SEED.md", "skills/wix-headless/references/SDK_HANDOFF.md"]
    dryRun: [hs-dr-arch, hs-dr-intra]
    e2e: []
  - paths: ["skills/wix-headless/references/IMAGE_GENERATION.md", "skills/wix-headless/references/AI_FEATURES.md"]
    dryRun: [hs-dr-gates]
    e2e: []
  - paths: ["skills/wix-headless/references/astro.md", "skills/wix-headless/references/non-astro.md"]
    dryRun: [hs-dr-gates, hs-dr-arch]
    e2e: []

  # ── Project type / operation (managed / self-managed / stripe) ──
  - paths: ["skills/wix-headless/references/managed/CREATE.md"]
    dryRun: [hs-dr-operation, hs-dr-gates]   # create flow + framework/imagery/release
    e2e: []
  - paths: ["skills/wix-headless/references/managed/CONNECT.md"]
    dryRun: [hs-dr-operation]
    e2e: []
  - paths: ["skills/wix-headless/references/managed/DEPLOYMENT.md"]
    dryRun: [hs-dr-gates]                    # release cadence
    e2e: []
  - paths: ["skills/wix-headless/references/managed/AUTHENTICATION.md"]
    dryRun: [hs-dr-projecttype, hs-dr-operation]
    e2e: []
  - paths: ["skills/wix-headless/references/self-managed/**", "skills/wix-headless/references/stripe/**"]
    dryRun: [hs-dr-projecttype]
    e2e: []

  # ── Per-vertical recipes (setup-* + how-to-code-*) → intra/precondition tags + the vertical's e2e ──
  - paths: ["skills/wix-headless/references/inline-recipes/*store*", "skills/wix-headless/references/inline-recipes/setup-online-store.md"]
    dryRun: [hs-dr-intra, hs-dr-arch]
    e2e: [hs-store]
  - paths: ["skills/wix-headless/references/inline-recipes/*cms*"]
    dryRun: [hs-dr-intra, hs-dr-arch]
    e2e: [hs-cms]
  - paths: ["skills/wix-headless/references/inline-recipes/*forms*"]
    dryRun: [hs-dr-intra, hs-dr-preconditions]
    e2e: [hs-forms]
  - paths: ["skills/wix-headless/references/inline-recipes/*events*"]
    dryRun: [hs-dr-intra, hs-dr-preconditions, hs-dr-routing]   # RSVP-vs-forms trap
    e2e: [hs-events]
  - paths: ["skills/wix-headless/references/inline-recipes/*pricing-plans*"]
    dryRun: [hs-dr-intra, hs-dr-preconditions, hs-dr-appinstall]
    e2e: [hs-pricing-plans]
  - paths: ["skills/wix-headless/references/inline-recipes/*bookings*"]
    dryRun: [hs-dr-routing, hs-dr-intra]                        # bookings-vs-restaurant trap
    e2e: [hs-bookings]
  - paths: ["skills/wix-headless/references/inline-recipes/*blog*"]
    dryRun: [hs-dr-intra, hs-dr-appinstall]                     # comments ⇒ members
    e2e: [hs-blog]
  - paths: ["skills/wix-headless/references/inline-recipes/*portfolio*"]
    dryRun: [hs-dr-intra]
    e2e: [hs-portfolio]
  - paths: ["skills/wix-headless/references/inline-recipes/*restaurant*", "skills/wix-headless/references/inline-recipes/setup-restaurants.md", "skills/wix-headless/references/inline-recipes/how-to-code-restaurants.md"]
    dryRun: [hs-dr-routing, hs-dr-preconditions, hs-dr-intra]   # table/experience-vs-bookings traps
    e2e: [hs-restaurants, hs-restaurant-experiences]
  - paths: ["skills/wix-headless/references/inline-recipes/*members*"]
    dryRun: [hs-dr-appinstall, hs-dr-intra]                     # identity-vs-profile install, custom login
    e2e: [hs-pricing-plans]                                     # members exercised end-to-end via plans

# Any changed skills/wix-headless file that matches no rule above.
fallback:
  dryRun: ["*"]     # be safe: run the whole dry-run suite
  e2e: []
